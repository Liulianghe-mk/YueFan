server:
  port: 8080

spring:
  application:
    name: yuefan-backend
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
  datasource:
    url: jdbc:h2:mem:yuefan;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

yuefan:
  upload:
    dir: ./uploads
    public-prefix: /uploads
  cors:
    # 管理端 Vite 等；小程序开发者工具从 https 页访问本机 http API 会触发 CORS + Private Network Access。
    # CorsConfig 已 allowPrivateNetwork、allowedMethods=*、allowedHeaders=*，避免 POST 被拦成 403（响应里常见 Allow: GET）。
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,https://servicewechat.com"
  security:
    admin-jwt-secret: "dev-admin-jwt-secret-change-me-32chars-min!!"
    app-jwt-secret: "dev-app-jwt-secret-change-me-32chars-min!!!!"
    admin-jwt-expiration-ms: 7200000
    app-jwt-expiration-ms: 2592000000
  wx:
    app-id: ""
    app-secret: ""

logging:
  level:
    org.springframework.security: INFO
